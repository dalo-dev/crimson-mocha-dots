# Don't print a new line at the start of the prompt
add_newline = false

# Activate the Catppuccin Mocha palette
palette = "catppuccin_mocha"

# Pipes в•°в”Җ в•ӯв”Җ
# Powerline symbols  оӮ° оӮұ оӮІ оӮі оӮҙ оӮө оӮ¶ оӮ· оӮё оӮ№ оӮә оӮ» оӮј оӮҪ оӮҫ оӮҝ оғҖ оғҒ оғӮ оғғ оғ„ оғ… оғҶ оғҮ оғҲ оғҠ  оғҢ оғҚ оғҺ оғҸ оғҗ оғ‘ оғ” оғ’
# Wedges рҹӯ§рҹӯ’ рҹӯЈрҹӯ§рҹӯ“
# Random noise рҹ¬–рҹ¬Ҙрҹ¬”рҹ¬—
# Cool stuff у°ңҘ о©ұ пҒӢ пҖҚ

format = """
$cmd_duration $directory$git_branch
  $character"""

[fill]
symbol = '-'
style = 'fg:surface2'

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]
success_symbol = "[о©ұ пҒӢ](bold fg:red)"
error_symbol = "[пҖҚ пҒӢ](bold fg:maroon)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg:surface1"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:surface1)[$symbol $branch(:$remote_branch)](fg:text bg:surface1)[оӮҙ ](bold fg:surface1)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format =  "[вҖў$hostname](bg:surface0 bold fg:text)[оӮҙ](bold fg:surface0)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:surface0 fg:text"
style_root = "red bold"
format = "[оӮ¶](bold fg:surface0)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:red fg:base"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:red)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:red)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:surface0)[у°Әў $duration](bold bg:surface0 fg:subtext1)[оӮҙ](bold fg:surface0)'

# Define the Catppuccin Mocha Palette
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
